<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
      @keyframes scan { 0% { transform: translateY(-220px) } 100% { transform: translateY(220px) } }
      @keyframes pulse { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }
      @keyframes rain { 0% { transform: translateY(-20px); opacity: 0 } 10% { opacity: 1 } 90% { opacity: 1 } 100% { transform: translateY(220px); opacity: 0 } }
      @keyframes boot { 0% { width: 0 } 100% { width: 160 } }
      @keyframes fadeIn { 0% { opacity: 0 } 100% { opacity: 1 } }
      .b { animation: blink 1s step-end infinite }
      .s { animation: scan 3s linear infinite }
      .p { animation: pulse 2s ease-in-out infinite }
      .f1 { animation: fadeIn 0.5s ease-out 0.5s both }
      .f2 { animation: fadeIn 0.5s ease-out 1s both }
      .f3 { animation: fadeIn 0.5s ease-out 1.5s both }
      .f4 { animation: fadeIn 0.5s ease-out 2s both }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="#0a0a0a" rx="4" />

  <rect class="s" width="900" height="2" fill="#00ff41" opacity="0.06" />

  <g font-family="'Courier New',monospace" fill="#00ff41" filter="url(#glow)">

    <text x="30" y="30" font-size="11" opacity="0.4">[SYSTEM] init profile.atpaawej</text>
    <text class="f1" x="30" y="50" font-size="11" opacity="0.4">[SYSTEM] loading entrepreneur_module...</text>
    <text class="f2" x="30" y="70" font-size="11" opacity="0.4">[SYSTEM] module loaded. status: BUILDING</text>

    <text class="f3" x="40" y="110" font-size="28" font-weight="bold" fill="#00ff41" letter-spacing="4">> AAWEJ</text>
    <text class="f3" x="40" y="140" font-size="13" fill="#00cc33" opacity="0.8">FOUNDER // HACKER // BUILDER</text>
    <text class="f4" x="40" y="165" font-size="12" fill="#009926" opacity="0.6">BUILDING A COMPANY. LEARNING IN PUBLIC. AGE 16.</text>

    <text x="40" y="195" font-size="12" fill="#00ff41">[PROGRESS]</text>
    <rect x="140" y="186" width="0" height="10" fill="none" stroke="#00ff41" stroke-width="1.5" rx="2">
      <animate attributeName="width" from="0" to="160" dur="2s" begin="2.5s" fill="freeze" />
    </rect>
    <rect x="140" y="186" width="0" height="10" fill="#00ff41" opacity="0.3" rx="2">
      <animate attributeName="width" from="0" to="160" dur="2s" begin="2.5s" fill="freeze" />
    </rect>
    <text class="b" x="310" y="195" font-size="12" fill="#00ff41">█</text>

  </g>

  <g font-family="monospace" font-size="10" fill="#00ff41" opacity="0.08">
    <text x="700" y="30">01001</text>
    <text x="720" y="50">10010</text>
    <text x="690" y="70">11010</text>
    <text x="710" y="90">00101</text>
    <text x="695" y="110">10100</text>
    <text x="715" y="130">01101</text>
    <text x="705" y="150">10011</text>
  </g>
</svg>
